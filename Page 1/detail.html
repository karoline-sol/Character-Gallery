<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>Character Detail</h1>
    </header>
   
   
<section class="imgblock">
    <div class="card">
        <img src="./images/neraxis.png" alt="neraxis image">
        <h3 class="imgtxt">Neraxis Dragon</h3>
        <p class="imgtxt">Master of the Dark Forces</p>
    </div>
</section>

<section class="container">
    <div class="dragonitems">
    <h2>Bag</h2>
    <ul>
      <li>No items in bag</li>
    </ul>


<form class="itemdetail">
    <label class="label2" for="type">Item Type:</label>
     <input class="input2" type="text" id = "item type" name = "item type" placeholder = "Choose type">
    <label class="label2" for="item name">Item Name:</label>
     <input class="input2" type="text" id = "item name" name = "item name" placeholder = "e.g. Rune of Fire">

     <button type="submit">Add Item</button>
</form>
    </div>
</section>
<script src="detail.js"></script>
</body>
</html>
